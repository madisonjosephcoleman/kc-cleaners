<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowLg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bgGrad)"/>

  <!-- Decorative accent circle (top right) -->
  <circle cx="1400" cy="-50" r="350" fill="#10b981" opacity="0.06"/>
  <!-- Decorative accent circle (bottom left) -->
  <circle cx="100" cy="450" r="300" fill="#0d9488" opacity="0.04"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="380" width="1584" height="16" fill="url(#shieldGrad)"/>

  <!-- Vacuum Icon (scaled up for banner) -->
  <g transform="translate(120, 45) scale(2.5)">
    <g transform="translate(5, 5)">
      <line x1="15" y1="80" x2="35" y2="80" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
      <line x1="22" y1="85" x2="43" y2="85" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
      <line x1="12" y1="90" x2="30" y2="90" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
      <g transform="translate(55, 85)">
        <path d="M -8 2 L -8 -6 C -8 -15 -2 -18 5 -18 C 12 -18 15 -10 20 -8 C 25 -6 32 -4 32 -2 C 32 0 30 2 25 2 Z" fill="#0f172a" />
        <path d="M -6 -4 C -6 -12 -1 -15 5 -15" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
        <circle cx="0" cy="0" r="7" fill="url(#shieldGrad)" filter="url(#glow)"/>
        <circle cx="0" cy="0" r="4" fill="#10b981" opacity="0.9"/>
        <circle cx="-2" cy="-10" r="6" fill="#0f172a" />
      </g>
      <g transform="translate(53, 75) rotate(-25)">
        <rect x="-4" y="-70" width="6" height="26" fill="#0f172a" />
        <path d="M -1 -70 L -1 -72 C -1 -74 -3 -76 -8 -76 L -15 -76" fill="none" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>
        <rect x="-6" y="-55" width="2" height="8" fill="url(#shieldGrad)" rx="1" />
        <path d="M -10 -45 L 8 -45 C 10 -45 12 -43 12 -40 L 12 -5 C 12 2 8 6 0 6 L -6 6 C -10 6 -12 2 -12 -5 L -12 -40 C -12 -43 -10 -45 -10 -45 Z" fill="#0f172a" />
        <line x1="-8" y1="-25" x2="8" y2="-25" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
        <line x1="-8" y1="-15" x2="8" y2="-15" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
      </g>
    </g>
  </g>

  <!-- Company Name -->
  <text x="420" y="180" font-family="'Outfit', sans-serif" font-weight="900" font-size="72" fill="#0f172a" letter-spacing="-0.04em">
    KC Cleaners<tspan fill="#10b981">.</tspan>
  </text>

  <!-- Tagline -->
  <text x="424" y="225" font-family="'Inter', sans-serif" font-weight="600" font-size="22" fill="#94a3b8" letter-spacing="0.12em">
    PREMIUM CLEANING SERVICES
  </text>

  <!-- Subtext -->
  <text x="424" y="275" font-family="'Inter', sans-serif" font-weight="400" font-size="24" fill="#475569">
    Commercial cleaning solutions for the Kansas City Metro
  </text>

  <!-- Website -->
  <text x="424" y="330" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#10b981">
    kc-cleaners.com
  </text>
</svg>
